{{ define "main" }}
<style>
  .blog-header {
    padding: 72px 40px 48px;
    border-bottom: 1px solid var(--line);
  }

  .blog-header__label {
    font-size: 0.55rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 16px;
  }

  .blog-header__title {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: clamp(2rem, 5vw, 3.5rem);
    letter-spacing: 0.06em;
    color: var(--ink);
  }

  .blog-grid {
    max-width: 900px;
    margin: 0 auto;
    padding: 56px 40px 80px;
    display: grid;
    gap: 0;
  }

  .post-item {
    display: grid;
    grid-template-columns: 120px 1fr;
    gap: 32px;
    padding: 36px 0;
    border-bottom: 1px solid var(--line);
    text-decoration: none;
    color: inherit;
    transition: opacity 0.2s;
  }

  .post-item:hover { opacity: 0.65; }

  .post-item__date {
    font-size: 0.55rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--mid);
    padding-top: 4px;
  }

  .post-item__title {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: 1.4rem;
    letter-spacing: 0.02em;
    color: var(--ink);
    margin-bottom: 10px;
    line-height: 1.3;
  }

  .post-item__desc {
    font-size: 0.7rem;
    letter-spacing: 0.05em;
    color: var(--mid);
    line-height: 1.7;
  }

  .blog-empty {
    padding: 80px 40px;
    text-align: center;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 1.1rem;
    color: var(--mid);
  }

  @media (max-width: 600px) {
    .blog-header { padding: 48px 20px 32px; }
    .blog-grid { padding: 32px 20px 60px; }
    .post-item { grid-template-columns: 1fr; gap: 8px; }
  }
</style>

<div class="blog-header">
  <p class="blog-header__label">Journal</p>
  <h1 class="blog-header__title">Notes on Architecture</h1>
</div>

<div class="blog-grid">
  {{ if .Pages }}
    {{ range .Pages.ByDate.Reverse }}
    <a class="post-item" href="{{ .Permalink }}">
      <span class="post-item__date">{{ .Date.Format "2 Jan 2006" }}</span>
      <div>
        <h2 class="post-item__title">{{ .Title }}</h2>
        {{ if .Description }}<p class="post-item__desc">{{ .Description }}</p>{{ end }}
      </div>
    </a>
    {{ end }}
  {{ else }}
    <p class="blog-empty">Posts coming soon.</p>
  {{ end }}
</div>
{{ end }}
